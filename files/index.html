<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ExamPass — Examination Card Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* ============ THEME TOKENS ============ */
  :root {
    --accent: #5b54d6;
    --radius-scale: 1;

    --bg: oklch(0.972 0.006 75);
    --canvas: oklch(0.945 0.008 75);
    --surface: oklch(0.995 0.003 80);
    --surface-2: oklch(0.978 0.006 75);
    --text: oklch(0.255 0.018 285);
    --text-2: oklch(0.46 0.02 285);
    --muted: oklch(0.62 0.018 285);
    --line: oklch(0.915 0.008 285);
    --line-strong: oklch(0.86 0.01 285);

    --success: oklch(0.605 0.13 152);
    --success-soft: color-mix(in oklch, var(--success) 14%, var(--surface));
    --danger: oklch(0.585 0.185 24);
    --danger-soft: color-mix(in oklch, var(--danger) 13%, var(--surface));
    --warn: oklch(0.74 0.13 75);

    --accent-soft: color-mix(in oklch, var(--accent) 13%, var(--surface));
    --accent-softer: color-mix(in oklch, var(--accent) 7%, var(--surface));
    --accent-ink: color-mix(in oklch, var(--accent) 72%, black);

    --shadow-sm: 0 1px 2px oklch(0.4 0.02 285 / 0.05), 0 2px 6px oklch(0.4 0.02 285 / 0.05);
    --shadow-md: 0 4px 14px oklch(0.4 0.03 285 / 0.08), 0 2px 5px oklch(0.4 0.03 285 / 0.06);
    --shadow-lg: 0 18px 48px oklch(0.35 0.03 285 / 0.16), 0 6px 16px oklch(0.35 0.03 285 / 0.08);

    --r-xs: calc(8px * var(--radius-scale));
    --r-sm: calc(12px * var(--radius-scale));
    --r-md: calc(18px * var(--radius-scale));
    --r-lg: calc(24px * var(--radius-scale));
    --r-xl: calc(30px * var(--radius-scale));
    --r-pill: 999px;

    --font: "Plus Jakarta Sans", system-ui, sans-serif;
    --mono: "Space Mono", ui-monospace, monospace;
  }

  [data-theme="dark"] {
    --bg: oklch(0.225 0.014 285);
    --canvas: oklch(0.17 0.012 285);
    --surface: oklch(0.272 0.015 285);
    --surface-2: oklch(0.305 0.016 285);
    --text: oklch(0.965 0.004 285);
    --text-2: oklch(0.78 0.012 285);
    --muted: oklch(0.64 0.014 285);
    --line: oklch(0.34 0.014 285);
    --line-strong: oklch(0.4 0.016 285);
    --success: oklch(0.7 0.14 152);
    --success-soft: color-mix(in oklch, var(--success) 20%, var(--surface));
    --danger: oklch(0.68 0.18 24);
    --danger-soft: color-mix(in oklch, var(--danger) 22%, var(--surface));
    --accent-soft: color-mix(in oklch, var(--accent) 26%, var(--surface));
    --accent-softer: color-mix(in oklch, var(--accent) 15%, var(--surface));
    --accent-ink: color-mix(in oklch, var(--accent) 30%, white);
    --shadow-lg: 0 18px 48px oklch(0 0 0 / 0.45), 0 6px 16px oklch(0 0 0 / 0.3);
    --shadow-md: 0 4px 14px oklch(0 0 0 / 0.3);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background:
      radial-gradient(120% 90% at 15% -5%, color-mix(in oklch, var(--accent) 9%, var(--canvas)), transparent 60%),
      var(--canvas);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; }

  /* ============ STAGE / DEVICE ============ */
  #root { min-height: 100vh; }
  .stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(18px, 4vw, 56px);
    padding: 40px 28px;
  }

  .device {
    position: relative;
    width: 393px;
    height: 852px;
    flex: 0 0 auto;
    background: #0c0c11;
    border-radius: 54px;
    padding: 11px;
    box-shadow: var(--shadow-lg), inset 0 0 0 2px oklch(0.3 0.01 285 / 0.6);
  }
  .device::after {
    content: "";
    position: absolute;
    inset: 5px;
    border-radius: 49px;
    box-shadow: inset 0 0 0 2px oklch(0.55 0.01 285 / 0.35);
    pointer-events: none;
    z-index: 60;
  }
  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* status bar */
  .statusbar {
    height: 52px;
    flex: 0 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 30px 6px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2px;
    color: var(--text);
    position: relative;
    z-index: 30;
  }
  .statusbar.on-dark { color: #fff; }
  .statusbar .notch {
    position: absolute;
    top: 9px; left: 50%;
    transform: translateX(-50%);
    width: 116px; height: 31px;
    background: #0c0c11;
    border-radius: 18px;
  }
  .sb-right { display: flex; align-items: center; gap: 6px; }
  .sb-right svg { display: block; }

  /* scroll area */
  .view {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  .view::-webkit-scrollbar { width: 0; height: 0; }
  .pad { padding: 4px 22px 22px; }

  /* home indicator */
  .home-ind {
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    width: 134px; height: 5px;
    border-radius: 3px;
    background: var(--text);
    opacity: 0.32;
    z-index: 40;
  }
  .home-ind.on-dark { background: #fff; opacity: 0.7; }

  /* ============ TYPE ============ */
  .h1 { font-size: 27px; font-weight: 800; letter-spacing: -0.5px; margin: 0; line-height: 1.12; }
  .h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; margin: 0; }
  .eyebrow { font-size: 11.5px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); margin: 0; }
  .body { font-size: 14.5px; line-height: 1.5; color: var(--text-2); margin: 0; }
  .mono { font-family: var(--mono); }
  .label-sm { font-size: 11px; font-weight: 700; letter-spacing: 0.9px; text-transform: uppercase; color: var(--muted); }

  /* ============ BUTTONS ============ */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 9px;
    height: 54px; padding: 0 22px;
    border-radius: var(--r-md);
    font-size: 16px; font-weight: 700;
    transition: transform .12s ease, filter .15s ease, background .15s ease;
    width: 100%;
  }
  .btn:active { transform: scale(0.975); }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 8px 20px color-mix(in oklch, var(--accent) 36%, transparent); }
  .btn-primary:active { filter: brightness(0.96); }
  .btn-ghost { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
  .btn-soft { background: var(--accent-soft); color: var(--accent-ink); }
  .btn-danger-soft { background: var(--danger-soft); color: var(--danger); }
  .btn-sm { height: 44px; font-size: 14.5px; border-radius: var(--r-sm); }

  /* ============ CARDS ============ */
  .card {
    background: var(--surface);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm);
  }
  .card-pad { padding: 18px; }

  /* pills */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    height: 28px; padding: 0 12px;
    border-radius: var(--r-pill);
    font-size: 12.5px; font-weight: 700;
    white-space: nowrap;
  }
  .pill-success { background: var(--success-soft); color: var(--success); }
  .pill-danger { background: var(--danger-soft); color: var(--danger); }
  .pill-neutral { background: var(--surface-2); color: var(--text-2); }
  .dot { width: 7px; height: 7px; border-radius: 50%; }

  /* inputs */
  .field {
    width: 100%;
    height: 56px;
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: var(--r-md);
    padding: 0 16px 0 48px;
    font-size: 16px;
    color: var(--text);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .field::placeholder { color: var(--muted); }
  .field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-softer); }
  .field-wrap { position: relative; }
  .field-wrap > svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

  /* bottom nav */
  .tabbar {
    flex: 0 0 auto;
    display: flex;
    align-items: stretch;
    padding: 8px 14px calc(8px + env(safe-area-inset-bottom));
    padding-bottom: 24px;
    background: color-mix(in oklch, var(--surface) 88%, transparent);
    backdrop-filter: blur(14px);
    border-top: 1px solid var(--line);
    position: relative;
    z-index: 30;
  }
  .tab {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 6px 0;
    color: var(--muted);
    font-size: 10.5px; font-weight: 700;
    transition: color .15s ease;
  }
  .tab.active { color: var(--accent); }
  .tab svg { width: 24px; height: 24px; }
  .tab-scan {
    margin-top: -26px;
  }
  .tab-scan .scan-fab {
    width: 58px; height: 58px;
    border-radius: 20px;
    background: var(--accent);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 22px color-mix(in oklch, var(--accent) 42%, transparent);
    border: 4px solid var(--bg);
  }

  /* avatars */
  .avatar {
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex: 0 0 auto;
    position: relative;
  }
  .photo-ph {
    background:
      repeating-linear-gradient(135deg, var(--accent-softer), var(--accent-softer) 7px, transparent 7px, transparent 14px),
      var(--accent-soft);
    color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  /* misc */
  .row { display: flex; align-items: center; }
  .between { justify-content: space-between; }
  .col { display: flex; flex-direction: column; }
  .divider { height: 1px; background: var(--line); border: none; margin: 0; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    height: 36px; padding: 0 14px;
    border-radius: var(--r-pill);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
    font-size: 13px; font-weight: 600; color: var(--text-2);
    white-space: nowrap;
    transition: all .14s ease;
  }
  .chip.active { background: var(--accent); color: #fff; box-shadow: 0 6px 14px color-mix(in oklch, var(--accent) 32%, transparent); }

  /* screen transition */
  .screen-anim { animation: fadeUp .34s cubic-bezier(.22,.61,.36,1) both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .pop { animation: pop .42s cubic-bezier(.2,.9,.3,1.2) both; }
  @keyframes pop { 0% { opacity:0; transform: scale(.7);} 60%{opacity:1;} 100%{transform:scale(1);} }
  @keyframes scanline { 0%{ top: 8%; } 50%{ top: 90%; } 100%{ top: 8%; } }
  @keyframes pulse { 0%,100%{ transform: scale(1); opacity: 1; } 50%{ transform: scale(1.5); opacity: 0.45; } }

  /* bottom sheet (session form) */
  .sheet-scrim {
    position: absolute; inset: 0; z-index: 80;
    background: oklch(0.15 0.02 285 / 0.5);
    display: flex; align-items: flex-end;
    animation: fade .2s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .sheet {
    width: 100%;
    background: var(--bg);
    border-top-left-radius: 28px;
    border-top-right-radius: 28px;
    padding: 12px 22px 30px;
    max-height: 90%;
    overflow-y: auto;
    box-shadow: 0 -10px 40px oklch(0 0 0 / 0.2);
    animation: sheetUp .34s cubic-bezier(.22,.61,.36,1);
  }
  .sheet::-webkit-scrollbar { width: 0; }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: none; } }
  .sheet-handle { width: 38px; height: 5px; border-radius: 3px; background: var(--line-strong); margin: 0 auto 16px; }
  .fld-label { display: block; font-size: 12px; font-weight: 700; color: var(--text-2); margin-bottom: 7px; letter-spacing: 0.2px; }

  /* ===== reviewer side rail ===== */
  .rail {
    flex: 0 0 auto;
    width: 210px;
    align-self: stretch;
    max-height: 852px;
    display: flex; flex-direction: column;
    gap: 4px;
    background: color-mix(in oklch, var(--surface) 70%, transparent);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 16px;
    box-shadow: var(--shadow-sm);
    backdrop-filter: blur(8px);
    align-self: center;
  }
  .rail h4 { margin: 2px 4px 10px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-weight: 800; }
  .rail button {
    text-align: left;
    padding: 9px 12px;
    border-radius: 12px;
    font-size: 13.5px; font-weight: 600;
    color: var(--text-2);
    display: flex; align-items: center; gap: 10px;
    transition: background .12s ease, color .12s ease;
  }
  .rail button:hover { background: var(--surface-2); }
  .rail button.active { background: var(--accent-soft); color: var(--accent-ink); }
  .rail .rk { font-family: var(--mono); font-size: 10px; opacity: 0.6; margin-left: auto; }
  @media (max-width: 720px) { .rail { display: none; } }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
